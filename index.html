<!doctype html>
<html lang="en">
  <head>
    <script>
  (function(l) {
    if (l.search[1] === 'p') {
      var decoded = l.search.slice(1).split('&').map(function(s) {
        return s.replace(/~and~/g, '&');
      });
      window.history.replaceState(
        null, null,
        l.pathname.slice(0, -1) + (decoded[0] ? '/' + decoded[0].slice(2) : '') +
        (decoded[1] ? '?' + decoded[1].slice(2) : '') +
        l.hash
      );
    }
  }(window.location));
</script>
